<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>The Rostrum</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400..700&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
    <style>
      :root { --base: #0C0B0D; --hairHi: rgba(255,255,255,0.14); }
      * { box-sizing: border-box; }
      html, body, #root { height: 100%; margin: 0; }
      body { background: var(--base, #0C0B0D); transition: background .25s ease; }
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-thumb { background: var(--hairHi, rgba(255,255,255,0.12)); border-radius: 6px; }
    </style>

    <div id="root"></div>
